
syntax = "proto3";

option java_multiple_files = true;
option java_package = "generated";
option java_outer_classname = "TestC";

package test;

message Empty {

}

message ArithmeticOpArguments {
  int32 arg1 = 1;
  int32 arg2 = 2;
}

message ArithmeticOpResult {
  int32 res = 1;
}

message EchoResult {
  string res = 1;
}

service Test {
  rpc Echo(Empty) returns (EchoResult) {}
  rpc Add(ArithmeticOpArguments) returns (ArithmeticOpResult) {}
}
